name: Import Codex skills

on:
  pull_request:
    branches:
      - main
    paths:
      - .bootstrap/trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild and verify archive
        shell: bash
        run: |
          set -euo pipefail

          expected_sha='b8f482302ca86b3cad3ee0f665c0b622cbc4ee228b1a8b585bd28fb5400b483a'
          mapfile -t parts < <(find .bootstrap -maxdepth 1 -type f -name 'part*' -print | sort -V)
          test "${#parts[@]}" -eq 8

          # Вариант 1: части являются фрагментами единой Base64-строки.
          if cat "${parts[@]}" | tr -d '\r\n\t ' | base64 --decode > skill.zip 2>/dev/null \
             && echo "$expected_sha  skill.zip" | sha256sum --check --strict; then
            echo 'Archive rebuilt from a single Base64 stream.'
          else
            # Вариант 2: каждая часть была закодирована в Base64 отдельно.
            : > skill.zip
            for part in "${parts[@]}"; do
              tr -d '\r\n\t ' < "$part" | base64 --decode >> skill.zip
            done
            echo "$expected_sha  skill.zip" | sha256sum --check --strict
            echo 'Archive rebuilt from independently encoded Base64 parts.'
          fi

      - name: Extract and validate bundle
        shell: bash
        run: |
          set -euo pipefail
          unzip -oq skill.zip
          test "$(find . -type f -not -path './.git/*' -not -path './.bootstrap/*' -not -path './.github/workflows/unpack-skills.yml' -not -name 'skill.zip' | wc -l)" -eq 51
          test "$(find . -name SKILL.md -type f | wc -l)" -eq 26

      - name: Commit imported skills
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap skill.zip .github/workflows/unpack-skills.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add Codex skill collection'
          git push origin HEAD:main
