name: Import Codex skills

on:
  pull_request:
    branches:
      - main
    paths:
      - .bootstrap/trigger
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import-skills:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Rebuild and verify archive
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t parts < <(find .bootstrap -maxdepth 1 -type f -name 'part*' -print | sort -V)
          test "${#parts[@]}" -eq 8

          cat "${parts[@]}" | tr -d '\r\n\t ' | base64 --decode > skill.zip

          echo "Archive size: $(wc -c < skill.zip) bytes"
          sha256sum skill.zip
          unzip -tq skill.zip

      - name: Extract and validate bundle
        shell: bash
        run: |
          set -euo pipefail
          unzip -oq skill.zip

          file_count="$(find . -type f \
            -not -path './.git/*' \
            -not -path './.bootstrap/*' \
            -not -path './.github/workflows/unpack-skills.yml' \
            -not -name 'skill.zip' | wc -l)"
          skill_count="$(find . -name SKILL.md -type f | wc -l)"

          echo "Extracted files: $file_count"
          echo "SKILL.md files: $skill_count"

          test "$file_count" -eq 51
          test "$skill_count" -eq 26

      - name: Commit imported skills
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .bootstrap skill.zip .github/workflows/unpack-skills.yml
          rmdir .github/workflows 2>/dev/null || true
          rmdir .github 2>/dev/null || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add Codex skill collection'
          git push origin HEAD:main
